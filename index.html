function clearAll(){
console.log('cleared')

function borderer(){
	let border_div = document.createElement('div')
	border_div.className = "borderer"

	return border_div
}
function sorter(){	
	students.sort(function (a, b){
		if(a.name < b.name){return -1}
		if(a.name > b.name){return 1}
		return 0
	})
}


function skill_matizer(skill_type, student){
	let mat_contain = document.createElement('div')
	mat_contain.className = "skill_matterial"
	let mastery_cell = document.createElement('div')
	let mastery = document.createElement('img')
	mastery.src = skill_books["비의서"]
	let Books_cell = document.createElement('div')
	let Books = document.createElement('img')
	Books.src = skill_type === "EX" ? skill_books[student.school.split(' ')[0] + "_DB"] : skill_books[student.school.split(' ')[0] + "_Book"]
	let mat1_cell = document.createElement('div')
	let mat1 = document.createElement('img')
	mat1.src = skill_matterial[student.matterials[0]]
	let mat2_cell = document.createElement('div')
	let mat2 = document.createElement('img')
	mat2.src = skill_matterial[student.matterials[1]]

	Books_cell.appendChild(Books)
	mat1_cell.appendChild(mat1)
	mat2_cell.appendChild(mat2)
	if(skill_type === "norm"){
		mastery_cell.appendChild(mastery)
		mat_contain.appendChild(mastery_cell)
	}
	mat_contain.appendChild(Books_cell)
	mat_contain.appendChild(mat1_cell)
	mat_contain.appendChild(mat2_cell)

	return mat_contain
}
function skill_cell(student, skill_title){
	let skill_type = skill_title === "EX 스킬" ? "ex" :
		skill_title === "기본 스킬" ? "basic" :
		skill_title === "강화 스킬" ? "enhance" :
		skill_title === "서브 스킬" ? "sub" : ""
	let skill = document.createElement('div')
	skill.className = "skill"
	skill.id = student.name.split(' ')[1] + skill_title.split(' ')[0]
	skill_ids.push(skill.id)

	let skill_cell = document.createElement('div')
	skill_cell.className = "skill_title"
	skill_cell.innerText = skill_title

	let skill_thumb_cont = document.createElement('div')
	let skill_thumb = document.createElement('img')
	skill_thumb.className = student.atk_type
	skill_thumb.src = student.skills[skill_type].thumb
	skill_thumb_cont.appendChild(skill_thumb)


	let skill_contain = document.createElement('div')	//skill-contents
	skill_contain.className = "skill_content"
	let skill_name = document.createElement('div')
	skill_name.innerText = student.skills[skill_type].name
	skill_name.className = "skill_name"
	if(skill_title === "EX 스킬"){
		let ex_cost = document.createElement('div')
		ex_cost.className = "ex-cost"
		ex_cost.innerHTML = "Cost : <span>" + student.skills[skill_type].cost.toString() + "</span>"
		skill_contain.appendChild(ex_cost)
	}
	skill_contain.appendChild(skill_name)
	let skill_summary = document.createElement('div')
	skill_summary.className = "skill_summary"
	skill_summary.innerHTML = student.skills[skill_type].content.split('\n').map((par) => "<p>" + par + "</p>").join("")
	if(skill_title === "EX 스킬"){
		let ex_mat = skill_matizer("EX", students[i])
		skill_contain.appendChild(ex_mat)
	}else{
		let norm_mat = skill_matizer("norm", students[i])
		skill_contain.appendChild(norm_mat)
	}
	skill_contain.appendChild(skill_summary)
	
	if(student.skills["ex_tr"]){

		let ex_cost = document.createElement('div')
		ex_cost.className = "ex-cost"
		ex_cost.innerHTML = "Cost : <span>" + student.skills["ex_tr"].cost.toString() + "</span>"
		let ex_tr_name = document.createElement('div')
		ex_tr_name.innerText = student.skills["ex_tr"].name
		ex_tr_name.className = "skill_name"
		let ex_tr_summary = document.createElement('div')
		ex_tr_summary.innerHTML = student.skills["ex_tr"].content.split('\n').map((par) => "<p>" + par + "</p>").join("")
		ex_tr_summary.className = "skill_summary"

		skill_contain.appendChild(borderer())
		skill_contain.appendChild(ex_cost)
		skill_contain.appendChild(ex_tr_name)
		skill_contain.appendChild(ex_tr_summary)
	}
	
	skill.appendChild(skill_cell)
	skill.appendChild(skill_thumb_cont)
	skill.appendChild(skill_contain)

	return skill
}

for(let ids of tag_ids){									//tag event
